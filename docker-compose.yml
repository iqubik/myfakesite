# file: docker-compose.yml v1.0
#
# Docker Compose configuration for MySphere Mock API portal.
# Конфигурация Docker Compose для портала MySphere (имитация API).
#
# Services: nginx (web server) + php-fpm (PHP processor)
# Сервисы: nginx (веб-сервер) + php-fpm (обработка PHP)

services:
  # ─── Nginx web server ───
  # Веб-сервер Nginx (раздаёт статику, проксирует PHP, имитирует API)
  fakesite:
    image: nginx:alpine
    container_name: fakesite
    restart: unless-stopped
    ports:
      # HTTP and HTTPS ports mapped to host
      # Порты HTTP и HTTPS проброшены на хост
      - "80:80"
      - "443:443"
    volumes:
      # Static files (read-only) — монтируются только файлы, не директории
      - ./data/apple-touch-icon.png:/usr/share/nginx/html/apple-touch-icon.png:ro
      - ./data/favicon.ico:/usr/share/nginx/html/favicon.ico:ro
      - ./data/index.html:/usr/share/nginx/html/index.html:ro
      # Nginx configuration file
      # Файл конфигурации nginx
      - ./data/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/phpinfo.php:/usr/share/nginx/html/phpinfo.php:ro
      - ./data/robots.txt:/usr/share/nginx/html/robots.txt:ro
      - ./data/status.php:/usr/share/nginx/html/status.php:ro
      - ./data/VERSION:/usr/share/nginx/html/VERSION:ro
      # Dedicated auth attempts log storage on host
      - /var/log/myfakesite:/var/log/myfakesite
      # Let's Encrypt ACME challenge (for certbot webroot validation)
      # Челлендж Let's Encrypt (для валидации certbot через webroot)
      - /var/www/acme-challenge:/usr/share/nginx/html/.well-known/acme-challenge
      # SSL certificates (paths updated by install.sh for the target domain)
      # SSL-сертификаты (пути обновляются install.sh для целевого домена)
      - /etc/letsencrypt/live/YOUDOMEN.XXX/fullchain.pem:/etc/nginx/certs/fakesite.crt:ro
      - /etc/letsencrypt/live/YOUDOMEN.XXX/privkey.pem:/etc/nginx/certs/fakesite.key:ro
    networks:
      - fakesite
    depends_on:
      # Wait for php-fpm to be ready before starting
      # Запуск после php-fpm (зависимость)
      - php-fpm
    deploy:
      resources:
        limits:
          # CPU and memory limits for nginx container
          # Ограничения CPU и памяти для контейнера nginx
          cpus: "0.25"
          memory: 64M

  # ─── PHP-FPM processor ───
  # Обработчик PHP (выполняет PHP-скрипты через FastCGI)
  php-fpm:
    image: php:8.3-fpm-alpine
    container_name: fakesite-php
    restart: unless-stopped
    volumes:
      # PHP scripts (read-only) — same files as nginx sees
      # PHP-скрипты (read-only) — те же файлы, что видит и nginx
      - ./data/status.php:/usr/share/nginx/html/status.php:ro
      - ./data/phpinfo.php:/usr/share/nginx/html/phpinfo.php:ro
    networks:
      - fakesite
    deploy:
      resources:
        limits:
          # CPU and memory limits for php-fpm container
          # Ограничения CPU и памяти для контейнера php-fpm
          cpus: "0.1"
          memory: 32M

# ─── Networks ───
# Сети
networks:
  # Custom bridge network for inter-container communication
  # Кастомная bridge-сеть для связи между контейнерами
  fakesite:
    driver: bridge
