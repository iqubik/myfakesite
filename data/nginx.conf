# file: nginx.conf v1.0
#
# Main nginx configuration for MySphere Mock API portal.
# Основной конфиг nginx для портала MySphere (имитация API).
#
# Rate limiting for auth endpoint (3 req/min per IP, burst=2)
# Ограничение частоты запросов к /api/auth (3 запроса/мин на IP, burst=2)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m;
limit_req_status 429;

# Vary auth error messages based on request_id hex prefix
# Разнообразие сообщений об ошибках в зависимости от префикса $request_id
map $request_id $auth_error_msg {
    default                                         "Неверный логин или пароль. Попробуйте ещё раз.";
    "~^[0-3]"                                       "Пользователь не найден.";
    "~^[4-7]"                                       "Неверный пароль.";
    "~^[8-b]"                                       "Аккаунт временно заблокирован. Попробуйте позже.";
    "~^[c-f]"                                       "Слишком много попыток. Подождите и попробуйте снова.";
}

# ─── HTTP → HTTPS redirect ───
# Редирект всех HTTP-запросов на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUDOMEN.XXX;
    return 301 https://$host$request_uri;
}

# ─── HTTPS server ───
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUDOMEN.XXX;

    # SSL certificate paths (mounted via Docker volumes)
    # Пути к SSL-сертификатам (монтируются через Docker volumes)
    ssl_certificate /etc/nginx/certs/fakesite.crt;
    ssl_certificate_key /etc/nginx/certs/fakesite.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── Security headers (all responses) ───
    # Заголовки безопасности для всех ответов
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; media-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self';" always;

    # Remove nginx version from Server header
    # Скрыть версию nginx из заголовка Server
    server_tokens off;

    # ─── Main content (SPA routing) ───
    # Основной контент — все запросы отдают index.html (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ─── API endpoints ───
    # --- API endpoints ---

    # /api/status — health check
    # Проверка работоспособности сервера
    location ~ ^/api/status$ {
        default_type application/json;
        add_header X-Powered-By "MySphere/VERSION_PLACEHOLDER" always;
        add_header X-Request-Id "$request_id" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        return 200 '{"online":true,"maintenance":false,"version":"VERSION_PLACEHOLDER","build":"2026.03.15","product":"MySphere","api":"1.0"}';
    }

    # Custom error page for 429 rate limit
    # Кастомная страница ошибки при превышении лимита запросов
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        add_header Retry-After "20" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        return 429 '{"status":"error","message":"Слишком много запросов. Попробуйте через 20 секунд."}';
    }

    # /api/auth — authentication endpoint with rate limiting
    # Эндпоинт аутентификации с ограничением частоты запросов
    location ~ ^/api/auth$ {
        limit_req zone=auth_limit burst=2 nodelay;

        default_type application/json;
        add_header X-Request-Id "$request_id" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Set-Cookie "ms_session=eyJhbGciOiJIUzI1NiJ9.$request_id.sig; Path=/; HttpOnly; Secure; SameSite=Strict" always;
        add_header Set-Cookie "__Host-ms_privacy=ack; Path=/; Secure; SameSite=Strict" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        return 401 '{"status":"error","message":"$auth_error_msg"}';
    }

    # /api/files — file listing (requires auth)
    # Список файлов (требует авторизации)
    location ~ ^/api/files(/.*)?$ {
        default_type application/json;
        add_header X-Request-Id "$request_id" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        return 401 '{"status":"error","message":"Требуется авторизация"}';
    }

    # /api/users — user management (requires auth)
    # Управление пользователями (требует авторизации)
    location ~ ^/api/users(/.*)?$ {
        default_type application/json;
        add_header X-Request-Id "$request_id" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        return 401 '{"status":"error","message":"Требуется авторизация"}';
    }

    # /api/settings — settings endpoint
    # Настройки пользователя
    location ~ ^/api/settings$ {
        default_type application/json;
        add_header X-Request-Id "$request_id" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        return 200 '{"status":"ok","lang":"ru","theme":"auto","notifications":true,"two_factor":false,"storage":{"used":2847193600,"total":10737418240},"last_login":"2026-04-10T18:32:07Z"}';
    }

    # ─── Static files ───
    # Статические файлы

    # /robots.txt — robots exclusion protocol
    location = /robots.txt {
        default_type text/plain;
        add_header X-Content-Type-Options "nosniff" always;
        return 200 'User-agent: *
Allow: /
Disallow: /api/
Disallow: /admin/
Disallow: /internal/
';
    }

    # /heartbeat — keep-alive endpoint
    # Эндпоинт проверки активности (heartbeat)
    location = /heartbeat {
        default_type application/json;
        return 200 '{"ok":true,"ts":$msec}';
    }

    # /.well-known/ — service discovery (security.txt)
    # Файлы обнаружения сервисов (security.txt)
    location = /.well-known/security.txt {
        default_type text/plain;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 'Contact: mailto:admin@YOUDOMEN.XXX
Preferred-Languages: ru, en
Expires: 2027-01-01T00:00:00Z
';
    }

    location ~ ^/\.well-known/(?!security\.txt) {
        return 404;
    }

    # /favicon.ico and /apple-touch-icon.png — served from root
    # Иконки сайта — отдаются из корня с кэшированием 30 дней
    location = /favicon.ico {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /apple-touch-icon.png {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ─── PHP proxy ───
    # Проксирование PHP-запросов к php-fpm контейнеру
    location ~ \.php$ {
        root /usr/share/nginx/html;
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    }

    # ─── Access control ───
    # Блокировка доступа к чувствительным файлам и директориям
    location ~ ^/(?:\.ht.*|\.git.*|\.env.*|data/|config/|lib/|3rdparty/|templates/) {
        return 404;
    }

    # ─── Error pages ───
    # Страницы ошибок сервера
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
